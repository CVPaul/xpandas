name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
        torch-version: ["2.2.0", "2.4.0"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PyTorch
        run: |
          pip install torch==${{ matrix.torch-version }} --index-url https://download.pytorch.org/whl/cpu

      - name: Install xpandas (no build isolation)
        run: |
          pip install --no-build-isolation -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install PyTorch (CPU)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install xpandas
        run: |
          pip install --no-build-isolation -e ".[dev]"

      - name: Check C++ compilation
        run: |
          python -c "import xpandas; print('C++ extension loaded successfully')"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  build-wheel:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install PyTorch (CPU)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build wheel
        run: |
          pip install build setuptools wheel
          pip install --no-build-isolation -e .
          python -m build --no-isolation --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
